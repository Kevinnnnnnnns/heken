<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Heken — Sua plataforma de streaming premium. Assista filmes e séries quando quiser.">
  <title>Heken — Entrar</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="login-page" id="loginPage">

  <!-- Background -->
  <div class="login-bg"></div>
  <div class="login-glow login-glow-1"></div>
  <div class="login-glow login-glow-2"></div>

  <!-- Header -->
  <header class="login-header">
    <div class="login-logo">Heken</div>
  </header>

  <!-- Main -->
  <main class="login-main">
    <div class="login-card">
      <h1 id="formTitle">Entrar</h1>

      <form id="loginForm" novalidate>
        <!-- Username -->
        <div class="form-group">
          <input
            type="email"
            id="username"
            name="username"
            placeholder="email@exemplo.com"
            autocomplete="email"
            spellcheck="false"
            required
          >
          <label for="username">E-mail</label>
        </div>

        <!-- Password -->
        <div class="form-group">
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="senha"
              autocomplete="current-password"
              required
            >
            <label for="password">Senha</label>
            <button type="button" class="toggle-password" id="togglePwd" aria-label="Mostrar senha">
              Mostrar
            </button>
          </div>
        </div>

        <!-- Error -->
        <div class="login-error" id="loginError" role="alert"></div>

        <!-- Submit -->
        <button type="submit" class="login-btn" id="loginBtn">
          <span class="btn-text">Entrar</span>
          <div class="btn-loader"></div>
        </button>

        <div style="text-align:center; margin-top:24px; font-size:0.9rem;">
           <span id="toggleText">Ainda não tem uma conta?</span> 
           <a href="#" id="toggleMode" style="color:var(--red); font-weight:bold; text-decoration:none; margin-left:5px;">Criar conta</a>
        </div>
      </form>
    </div>
  </main>

  <!-- Footer -->
  <footer class="login-footer">
    <p>Heken &copy; 2025 — Desenvolvido com 🔥</p>
  </footer>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="js/auth.js"></script>
<script>
  // Redireciona se já logado
  Auth.redirectIfAuth();

  const form     = document.getElementById('loginForm');
  const errEl    = document.getElementById('loginError');
  const loginBtn = document.getElementById('loginBtn');
  const pwdInput = document.getElementById('password');
  const togglePwd= document.getElementById('togglePwd');

  // Toggle password visibility
  togglePwd.addEventListener('click', () => {
    const isText = pwdInput.type === 'text';
    pwdInput.type    = isText ? 'password' : 'text';
    togglePwd.textContent = isText ? 'Mostrar' : 'Ocultar';
  });

  // Show/hide error
  function showError(msg) {
    errEl.textContent = msg;
    errEl.classList.toggle('visible', !!msg);
    if (msg) {
      document.getElementById('username').classList.toggle('error', true);
      pwdInput.classList.toggle('error', true);
      setTimeout(() => {
        document.getElementById('username').classList.remove('error');
        pwdInput.classList.remove('error');
      }, 600);
    }
  }

  // Alternar entre Login e Registro
  let isRegisterMode = false;
  const formTitle = document.getElementById('formTitle');
  const toggleMode = document.getElementById('toggleMode');
  const toggleText = document.getElementById('toggleText');

  toggleMode.addEventListener('click', (e) => {
    e.preventDefault();
    isRegisterMode = !isRegisterMode;
    formTitle.textContent = isRegisterMode ? 'Criar Conta' : 'Entrar';
    loginBtn.querySelector('.btn-text').textContent = isRegisterMode ? 'Cadastrar' : 'Entrar';
    toggleText.textContent = isRegisterMode ? 'Já tem uma conta?' : 'Ainda não tem uma conta?';
    toggleMode.textContent = isRegisterMode ? 'Fazer login' : 'Criar conta';
    showError('');
  });

  // Form submit
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    showError('');

    const email = document.getElementById('username').value.trim();
    const password = pwdInput.value;

    if (!email || !password) {
      showError('Preencha e-mail e senha.');
      return;
    }

    // Loading state
    loginBtn.classList.add('loading');
    loginBtn.disabled = true;

    let result;
    if (isRegisterMode) {
      result = await Auth.register(email, password);
    } else {
      result = await Auth.login(email, password);
    }

    if (result.ok) {
      loginBtn.querySelector('.btn-text').textContent = isRegisterMode ? '✓ Conta criada!' : '✓ Entrando...';
      setTimeout(() => { window.location.href = 'home.html'; }, 400);
    } else {
      loginBtn.classList.remove('loading');
      loginBtn.disabled = false;
      showError(result.error);
    }
  });

  // Enter key on username → focus password
  document.getElementById('username').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); pwdInput.focus(); }
  });
</script>
</body>
</html>
