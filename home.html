<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Heken — Catálogo de filmes e séries. Assista o que quiser, quando quiser.">
  <title>Heken — Início</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body>

<!-- ─── NAVBAR ─────────────────────────────── -->
<nav class="navbar" id="navbar">
  <div class="nav-left">
    <div class="nav-logo" onclick="window.scrollTo({top:0,behavior:'smooth'})">Heken</div>
    <div class="nav-links">
      <a href="#" class="active">Início</a>
      <a href="#" onclick="document.getElementById('searchToggle').click();return false;">Buscar</a>
      <a href="#row-trending-movie">Filmes</a>
      <a href="#row-trending-tv">Séries</a>
    </div>
  </div>

  <div class="nav-right">
    <!-- Search -->
    <div class="search-bar" id="searchBar">
      <button class="search-toggle" id="searchToggle" aria-label="Abrir busca">🔍</button>
      <div class="search-input-wrap">
        <span class="search-icon-inner">🔍</span>
        <input type="search" id="searchInput" placeholder="Títulos, pessoas, gêneros" autocomplete="off">
        <button class="search-close" id="searchClose" aria-label="Fechar busca">✕</button>
      </div>
    </div>

    <!-- Avatar + dropdown -->
    <div class="nav-avatar" tabindex="0">
      <button class="avatar-btn" aria-haspopup="true" aria-expanded="false">
        <div class="avatar-img"><span class="avatar-initials">?</span></div>
        <span class="avatar-caret">▾</span>
      </button>
      <div class="avatar-dropdown" role="menu">
        <div class="dropdown-user">
          <div class="avatar-img"><span class="avatar-initials">?</span></div>
          <div>
            <div class="dropdown-user-name avatar-name">Usuário</div>
            <div class="dropdown-user-role avatar-role">Membro</div>
          </div>
        </div>
        <button class="dropdown-item" id="logoutBtn" role="menuitem">
          <span class="dropdown-item-icon">🚪</span> Sair
        </button>
      </div>
    </div>
  </div>
</nav>

<div class="navbar-gradient"></div>

<!-- ─── HERO ────────────────────────────────── -->
<section class="hero" id="hero">
  <div class="hero-bg" id="heroBg"></div>

  <div class="hero-content">
    <div class="hero-badge">🔥 Em Alta</div>
    <h1 class="hero-title" id="heroTitle">Carregando...</h1>
    <div class="hero-meta">
      <span class="hero-rating">⭐ <span id="heroRating">—</span></span>
      <div class="hero-dot"></div>
      <span class="hero-year" id="heroYear"></span>
    </div>
    <p class="hero-overview line-clamp-3" id="heroOverview"></p>
    <div class="hero-actions">
      <button class="btn-play" id="heroPlay">
        <span>▶</span> Assistir
      </button>
      <button class="btn-more" id="heroMore">
        <span>ℹ</span> Mais Informações
      </button>
    </div>
  </div>

  <!-- Dots navigation -->
  <div class="hero-skip">
    <div class="hero-dots" id="heroDots"></div>
  </div>
</section>

<!-- ─── CONTENT AREA ─────────────────────────── -->
<main class="content-area" id="contentArea">
  <!-- Seções injetadas pelo JS -->
</main>

<!-- ─── SEARCH RESULTS ─────────────────────── -->
<section id="searchResults">
  <p class="search-results-title" id="searchResultsTitle"></p>
  <div class="search-grid" id="searchGrid"></div>
</section>

<!-- ─── MODAL ───────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-label="Detalhes do título">
  <div class="modal">
    <!-- Modal hero image -->
    <div class="modal-hero">
      <img class="modal-hero-img" src="" alt="Capa do título">
      <div class="modal-hero-actions">
        <button class="btn-play modal-play-btn">▶ Assistir</button>
        <button class="btn-more modal-more-btn">ℹ Info</button>
      </div>
    </div>

    <button class="modal-close" onclick="closeModal()" aria-label="Fechar">✕</button>

    <!-- Modal body -->
    <div class="modal-body">
      <h2 class="modal-title"></h2>
      <div class="modal-meta"></div>
      <p class="modal-overview"></p>
      <div class="modal-tags"></div>
    </div>
  </div>
</div>

<!-- ─── FOOTER ──────────────────────────────── -->
<footer class="home-footer">
  <div class="footer-logo">Heken</div>
  <div class="footer-links">
    <a href="#">Central de Ajuda</a>
    <a href="#">Sobre</a>
    <a href="#">Privacidade</a>
    <a href="#">Termos de Uso</a>
  </div>
  <p>© 2025 Heken. Desenvolvido com ❤️ e muita cafeína.</p>
  <p style="margin-top:6px;font-size:.72rem;color:#555">
    Dados fornecidos por <a href="https://www.themoviedb.org" target="_blank" style="color:#777">TMDB</a>. Streaming via VidSrc.
  </p>
</footer>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/home.js"></script>
</body>
</html>
